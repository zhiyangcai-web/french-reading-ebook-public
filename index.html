<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-store">
  <title>French Reading Ebook</title>
  <style>
    :root {
      --bg: #f4f0e8;
      --paper: #fffdf8;
      --ink: #20242d;
      --muted: #6f7782;
      --line: #d8d0c4;
      --accent: #0f766e;
      --accent-soft: #d9f0ec;
      --yellow: #fff0a6;
      --green: #d9f2d8;
      --pink: #ffdbe8;
      --blue: #d9eaff;
      --reader-size: 20px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: Aptos, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      overscroll-behavior: none;
    }

    body {
      min-height: 100dvh;
      overflow: hidden;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: rgba(255, 253, 248, .94);
      color: var(--ink);
      min-height: 40px;
      border-radius: 8px;
      padding: 7px 10px;
      font-weight: 800;
      cursor: pointer;
      touch-action: manipulation;
    }

    button:disabled {
      opacity: .45;
      cursor: default;
    }

    input {
      width: 64px;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 7px 8px;
      background: rgba(255, 253, 248, .94);
      color: var(--ink);
      text-align: center;
      font-weight: 800;
    }

    .app {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      height: 100dvh;
      padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    }

    .topbar,
    .bottombar {
      width: min(860px, 100%);
      margin: 0 auto;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(244, 240, 232, .88);
      backdrop-filter: blur(14px);
      z-index: 5;
    }

    .topbar {
      justify-content: space-between;
      border-bottom: 1px solid rgba(216, 208, 196, .7);
    }

    .book-title {
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: 17px;
      line-height: 1.2;
      letter-spacing: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .page-count {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      line-height: 1.2;
      margin-top: 3px;
    }

    .jump {
      display: flex;
      align-items: center;
      gap: 5px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .viewport {
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-y;
      padding: 14px 12px 18px;
      scroll-behavior: smooth;
    }

    .page {
      width: min(780px, 100%);
      min-height: calc(100dvh - 156px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
      margin: 0 auto;
      padding: clamp(24px, 7vw, 58px);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      box-shadow: 0 12px 38px rgba(58, 50, 40, .13);
    }

    .page.turn-next {
      animation: turnNext .22s ease-out;
    }

    .page.turn-prev {
      animation: turnPrev .22s ease-out;
    }

    @keyframes turnNext {
      from {
        opacity: .4;
        transform: translateX(22px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes turnPrev {
      from {
        opacity: .4;
        transform: translateX(-22px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .page-label {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .text {
      font-family: Georgia, "Times New Roman", serif;
      font-size: var(--reader-size);
      line-height: 1.82;
      color: #1c222b;
      user-select: text;
      -webkit-user-select: text;
    }

    .text p {
      margin: 0 0 1em;
    }

    .text p:last-child {
      margin-bottom: 0;
    }

    mark.reader-mark {
      border-radius: 3px;
      color: inherit;
      padding: .02em .06em;
    }

    mark.yellow { background: var(--yellow); }
    mark.green { background: var(--green); }
    mark.pink { background: var(--pink); }
    mark.blue { background: var(--blue); }

    .bottombar {
      justify-content: center;
      border-top: 1px solid rgba(216, 208, 196, .7);
      flex-wrap: wrap;
    }

    .nav {
      width: 44px;
      font-size: 22px;
      line-height: 1;
      padding: 6px 8px;
    }

    .ghost {
      background: transparent;
    }

    .selection-tools {
      position: fixed;
      left: 50%;
      bottom: calc(74px + env(safe-area-inset-bottom));
      transform: translateX(-50%) translateY(16px);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 253, 248, .98);
      box-shadow: 0 14px 34px rgba(31, 35, 42, .22);
      opacity: 0;
      pointer-events: none;
      transition: opacity .16s ease, transform .16s ease;
      z-index: 20;
    }

    .selection-tools.visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) translateY(0);
    }

    .tool-label {
      padding: 0 4px 0 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
      white-space: nowrap;
    }

    .swatch {
      width: 34px;
      min-height: 34px;
      border-radius: 999px;
      padding: 0;
    }

    .swatch[data-color="yellow"] { background: var(--yellow); }
    .swatch[data-color="green"] { background: var(--green); }
    .swatch[data-color="pink"] { background: var(--pink); }
    .swatch[data-color="blue"] { background: var(--blue); }

    .status {
      position: fixed;
      left: 50%;
      bottom: calc(126px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      max-width: min(340px, calc(100vw - 28px));
      padding: 8px 11px;
      border-radius: 999px;
      background: rgba(32, 36, 45, .88);
      color: #fff;
      font-size: 13px;
      font-weight: 800;
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease;
      z-index: 30;
      text-align: center;
    }

    .status.visible {
      opacity: 1;
    }

    @media (max-width: 560px) {
      .topbar,
      .bottombar {
        padding-left: 10px;
        padding-right: 10px;
      }

      .page {
        min-height: calc(100dvh - 146px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
        padding: 28px 22px;
      }

      .text {
        line-height: 1.72;
      }

      .ghost.clear {
        flex-basis: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="book-title">
        <h1 id="title">French Reading Ebook</h1>
        <div id="pageCount" class="page-count">0 / 0</div>
      </div>
      <div class="jump">
        <input id="jumpInput" type="number" min="1" inputmode="numeric" aria-label="页码">
        <span id="jumpTotal">/ 0</span>
        <button id="jumpBtn" type="button">跳转</button>
      </div>
    </header>

    <section id="viewport" class="viewport" aria-label="ebook page">
      <article id="page" class="page">
        <div id="pageLabel" class="page-label"></div>
        <div id="text" class="text"></div>
      </article>
    </section>

    <footer class="bottombar">
      <button id="prevBtn" class="nav" type="button" aria-label="上一页">‹</button>
      <button id="nextBtn" class="nav" type="button" aria-label="下一页">›</button>
      <button id="sizeDownBtn" type="button">A-</button>
      <button id="sizeUpBtn" type="button">A+</button>
      <button id="clearBtn" class="ghost clear" type="button">清除本页高亮</button>
    </footer>

    <div id="selectionTools" class="selection-tools" aria-label="高亮工具">
      <span class="tool-label">高亮</span>
      <button class="swatch" data-color="yellow" type="button" aria-label="黄色"></button>
      <button class="swatch" data-color="green" type="button" aria-label="绿色"></button>
      <button class="swatch" data-color="pink" type="button" aria-label="粉色"></button>
      <button class="swatch" data-color="blue" type="button" aria-label="蓝色"></button>
    </div>
    <div id="status" class="status"></div>
  </main>

  <script>
    const storageKey = "ebook_reader_simple_state_v1";
    const legacyKey = "reading_ebook_state_v1";
    const els = {
      title: document.getElementById("title"),
      pageCount: document.getElementById("pageCount"),
      jumpInput: document.getElementById("jumpInput"),
      jumpTotal: document.getElementById("jumpTotal"),
      jumpBtn: document.getElementById("jumpBtn"),
      viewport: document.getElementById("viewport"),
      page: document.getElementById("page"),
      pageLabel: document.getElementById("pageLabel"),
      text: document.getElementById("text"),
      prevBtn: document.getElementById("prevBtn"),
      nextBtn: document.getElementById("nextBtn"),
      sizeDownBtn: document.getElementById("sizeDownBtn"),
      sizeUpBtn: document.getElementById("sizeUpBtn"),
      clearBtn: document.getElementById("clearBtn"),
      selectionTools: document.getElementById("selectionTools"),
      status: document.getElementById("status")
    };

    let book = null;
    let pages = [];
    let pageIndex = 0;
    let state = loadState();
    let lastSelection = null;
    let toastTimer = 0;
    let touchStart = null;

    function loadState() {
      const fallback = { pageId: "", fontSize: 20, highlights: {} };
      try {
        const saved = JSON.parse(localStorage.getItem(storageKey) || "null");
        if (saved) {
          return {
            pageId: saved.pageId || "",
            fontSize: Number(saved.fontSize || 20),
            highlights: saved.highlights && typeof saved.highlights === "object" ? saved.highlights : {}
          };
        }
        const legacy = JSON.parse(localStorage.getItem(legacyKey) || "null");
        if (legacy) {
          return {
            pageId: legacy.pageId || "",
            fontSize: Number(legacy.size || 20),
            highlights: legacy.highlights && typeof legacy.highlights === "object" ? legacy.highlights : {}
          };
        }
      } catch (error) {
        return fallback;
      }
      return fallback;
    }

    function saveState() {
      localStorage.setItem(storageKey, JSON.stringify(state));
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function currentPage() {
      return pages[pageIndex] || null;
    }

    function fullText(page) {
      return page.paragraphs.join("\n\n");
    }

    function paragraphOffset(page, paragraphIndex) {
      let offset = 0;
      for (let index = 0; index < paragraphIndex; index += 1) {
        offset += page.paragraphs[index].length + 2;
      }
      return offset;
    }

    function pageHighlights(page) {
      const raw = Array.isArray(state.highlights[page.id]) ? state.highlights[page.id] : [];
      const text = fullText(page);
      let changed = false;
      const normalized = raw
        .map(mark => {
          if (Number.isFinite(mark.start) && Number.isFinite(mark.end)) return mark;
          const quote = String(mark.text || "").trim();
          if (!quote) return null;
          const start = text.indexOf(quote);
          if (start < 0) return null;
          changed = true;
          return {
            id: mark.id || `${Date.now()}-${Math.random().toString(16).slice(2)}`,
            start,
            end: start + quote.length,
            color: mark.color || "yellow",
            text: quote
          };
        })
        .filter(Boolean)
        .sort((a, b) => a.start - b.start);
      if (changed) {
        state.highlights[page.id] = normalized;
        saveState();
      }
      return normalized;
    }

    function renderSegment(text, baseOffset, marks) {
      const ranges = marks
        .filter(mark => mark.end > baseOffset && mark.start < baseOffset + text.length)
        .map(mark => ({
          start: Math.max(0, mark.start - baseOffset),
          end: Math.min(text.length, mark.end - baseOffset),
          color: mark.color || "yellow"
        }))
        .sort((a, b) => a.start - b.start);
      if (!ranges.length) return escapeHtml(text);

      let html = "";
      let cursor = 0;
      for (const range of ranges) {
        if (range.start < cursor) continue;
        html += escapeHtml(text.slice(cursor, range.start));
        html += `<mark class="reader-mark ${range.color}">${escapeHtml(text.slice(range.start, range.end))}</mark>`;
        cursor = range.end;
      }
      html += escapeHtml(text.slice(cursor));
      return html;
    }

    function render(direction = 0) {
      const page = currentPage();
      if (!page) return;

      state.pageId = page.id;
      saveState();
      document.documentElement.style.setProperty("--reader-size", `${state.fontSize}px`);
      els.title.textContent = book.title || "French Reading Ebook";
      els.pageCount.textContent = `${pageIndex + 1} / ${pages.length}`;
      els.jumpInput.value = pageIndex + 1;
      const printedNumbers = pages.map(item => Number(item.number)).filter(Number.isFinite);
      const maxJump = printedNumbers.reduce((max, value) => Math.max(max, value), pages.length);
      els.jumpInput.max = String(maxJump);
      els.jumpTotal.textContent = `/ ${pages.length}`;
      els.pageLabel.textContent = page.label || `Page ${page.number || pageIndex + 1}`;
      els.prevBtn.disabled = pageIndex === 0;
      els.nextBtn.disabled = pageIndex === pages.length - 1;

      const marks = pageHighlights(page);
      els.text.replaceChildren();
      page.paragraphs.forEach((paragraph, index) => {
        const p = document.createElement("p");
        p.dataset.paragraph = String(index);
        p.innerHTML = renderSegment(paragraph, paragraphOffset(page, index), marks);
        els.text.appendChild(p);
      });
      els.clearBtn.disabled = marks.length === 0;

      els.page.classList.remove("turn-next", "turn-prev");
      if (direction) {
        void els.page.offsetWidth;
        els.page.classList.add(direction > 0 ? "turn-next" : "turn-prev");
      }
      els.viewport.scrollTop = 0;
      hideTools();
    }

    function goTo(index, direction = 0) {
      const next = Math.min(Math.max(index, 0), pages.length - 1);
      if (next === pageIndex) return;
      const actualDirection = direction || (next > pageIndex ? 1 : -1);
      pageIndex = next;
      render(actualDirection);
    }

    function jump() {
      const value = Number(els.jumpInput.value);
      if (!Number.isFinite(value)) return;
      if (value >= 1 && value <= pages.length) {
        goTo(value - 1);
        return;
      }
      const byPageNumber = pages.findIndex(page => Number(page.number) === value);
      if (byPageNumber >= 0) goTo(byPageNumber);
    }

    function showStatus(message) {
      window.clearTimeout(toastTimer);
      els.status.textContent = message;
      els.status.classList.add("visible");
      toastTimer = window.setTimeout(() => els.status.classList.remove("visible"), 1100);
    }

    function hideTools() {
      els.selectionTools.classList.remove("visible");
      lastSelection = null;
    }

    function nodeOffset(node, offset) {
      const paragraphs = Array.from(els.text.querySelectorAll("p"));
      let total = 0;
      for (const paragraph of paragraphs) {
        if (paragraph.contains(node)) {
          const range = document.createRange();
          range.selectNodeContents(paragraph);
          range.setEnd(node, offset);
          return total + range.toString().length;
        }
        total += paragraph.textContent.length + 2;
      }
      return -1;
    }

    function readSelection() {
      const selection = window.getSelection();
      if (!selection || selection.rangeCount === 0 || selection.isCollapsed) return null;
      const range = selection.getRangeAt(0);
      if (!els.text.contains(range.commonAncestorContainer)) return null;
      const start = nodeOffset(range.startContainer, range.startOffset);
      const end = nodeOffset(range.endContainer, range.endOffset);
      if (start < 0 || end <= start) return null;
      const page = currentPage();
      return {
        start,
        end,
        text: fullText(page).slice(start, end).replace(/\s+/g, " ").trim()
      };
    }

    function updateTools() {
      const selected = readSelection();
      if (!selected || !selected.text) {
        els.selectionTools.classList.remove("visible");
        return;
      }
      lastSelection = selected;
      els.selectionTools.classList.add("visible");
    }

    function addHighlight(color) {
      const page = currentPage();
      const selected = readSelection() || lastSelection;
      if (!page || !selected || selected.end <= selected.start) {
        showStatus("先选中文字");
        return;
      }
      const mark = {
        id: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
        start: selected.start,
        end: selected.end,
        text: selected.text,
        color
      };
      state.highlights[page.id] = [...pageHighlights(page), mark];
      saveState();
      const selection = window.getSelection();
      if (selection) selection.removeAllRanges();
      render();
      showStatus("已高亮");
    }

    function clearPageHighlights() {
      const page = currentPage();
      if (!page) return;
      state.highlights[page.id] = [];
      saveState();
      render();
      showStatus("已清除");
    }

    function changeFont(delta) {
      state.fontSize = Math.min(Math.max(Number(state.fontSize || 20) + delta, 16), 30);
      saveState();
      render();
    }

    function handleTap(event) {
      if (event.target.closest("button, input, mark")) return;
      const selection = window.getSelection();
      if (selection && !selection.isCollapsed) return;
      const rect = els.viewport.getBoundingClientRect();
      const x = event.clientX - rect.left;
      if (x < rect.width * .18) goTo(pageIndex - 1, -1);
      if (x > rect.width * .82) goTo(pageIndex + 1, 1);
    }

    function initEvents() {
      els.prevBtn.addEventListener("click", () => goTo(pageIndex - 1, -1));
      els.nextBtn.addEventListener("click", () => goTo(pageIndex + 1, 1));
      els.jumpBtn.addEventListener("click", jump);
      els.jumpInput.addEventListener("keydown", event => {
        if (event.key === "Enter") jump();
      });
      els.sizeDownBtn.addEventListener("click", () => changeFont(-1));
      els.sizeUpBtn.addEventListener("click", () => changeFont(1));
      els.clearBtn.addEventListener("click", clearPageHighlights);
      els.viewport.addEventListener("click", handleTap);

      els.selectionTools.addEventListener("pointerdown", event => event.preventDefault());
      els.selectionTools.querySelectorAll(".swatch").forEach(button => {
        button.addEventListener("click", () => addHighlight(button.dataset.color || "yellow"));
      });

      document.addEventListener("selectionchange", () => {
        window.setTimeout(updateTools, 40);
      });
      document.addEventListener("mouseup", () => window.setTimeout(updateTools, 40));
      document.addEventListener("touchend", () => window.setTimeout(updateTools, 80), { passive: true });

      els.viewport.addEventListener("touchstart", event => {
        if (event.touches.length !== 1) return;
        const touch = event.touches[0];
        touchStart = {
          x: touch.clientX,
          y: touch.clientY,
          time: Date.now()
        };
      }, { passive: true });

      els.viewport.addEventListener("touchmove", event => {
        if (!touchStart || event.touches.length !== 1) return;
        const touch = event.touches[0];
        const dx = touch.clientX - touchStart.x;
        const dy = touch.clientY - touchStart.y;
        if (Math.abs(dx) > 18 && Math.abs(dx) > Math.abs(dy) * 1.15) {
          event.preventDefault();
        }
      }, { passive: false });

      els.viewport.addEventListener("touchend", event => {
        if (!touchStart || event.changedTouches.length !== 1) return;
        const touch = event.changedTouches[0];
        const dx = touch.clientX - touchStart.x;
        const dy = touch.clientY - touchStart.y;
        const dt = Date.now() - touchStart.time;
        touchStart = null;
        if (dt > 900 || Math.abs(dx) < 52 || Math.abs(dx) < Math.abs(dy) * 1.15) return;
        if (dx < 0) goTo(pageIndex + 1, 1);
        if (dx > 0) goTo(pageIndex - 1, -1);
      }, { passive: true });

      window.addEventListener("keydown", event => {
        const active = document.activeElement;
        if (active && ["INPUT", "TEXTAREA", "BUTTON"].includes(active.tagName)) return;
        if (event.key === "ArrowLeft") goTo(pageIndex - 1, -1);
        if (event.key === "ArrowRight") goTo(pageIndex + 1, 1);
      });
    }

    function loadBook() {
      return fetch(`book.json?v=${Date.now()}`, { cache: "no-store" })
        .then(response => {
          if (!response.ok) throw new Error(`book.json ${response.status}`);
          return response.json();
        })
        .then(data => {
          book = data;
          pages = Array.isArray(book.pages) ? book.pages : [];
          const savedIndex = pages.findIndex(page => page.id === state.pageId);
          pageIndex = savedIndex >= 0 ? savedIndex : 0;
          initEvents();
          render();
        });
    }

    function registerOfflineCache() {
      if (!("serviceWorker" in navigator)) return;
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("service-worker.js").catch(error => {
          console.warn("Offline cache registration failed", error);
        });
      });
    }

    registerOfflineCache();

    loadBook().catch(error => {
      els.title.textContent = "读取失败";
      els.pageCount.textContent = String(error.message || error);
    });
  </script>
</body>
</html>
